<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 薪酬管理與員工自助系統 | Allison C&B Professional</title>
    <style>
        :root {
            --primary: #1a3a5f; --secondary: #2c5282; --accent: #e67e22;
            --bg: #f0f2f5; --white: #ffffff; --border: #e2e8f0; --error: #e53e3e; --success: #38a169;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: #2d3748; }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .main-layout { display: flex; max-width: 1200px; margin: 2rem auto; gap: 2rem; padding: 0 1rem; }
        .content-area { flex: 3; }
        .sidebar { flex: 1.2; position: sticky; top: 5rem; height: fit-content; }
        
        .section { background: var(--white); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 2rem; display: none; }
        .active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background: #f8fafc; color: var(--primary); }
        .highlight-row { background: #fffaf0; border: 2px solid var(--accent) !important; font-weight: bold; }
        
        .collapsible { background: #edf2f7; color: #2d3748; cursor: pointer; padding: 12px; width: 100%; border: none; text-align: left; border-radius: 8px; font-weight: bold; margin-top: 15px; display: flex; justify-content: space-between; }
        .collapsible:after { content: '\002B'; }
        .active-collapse:after { content: "\2212"; }
        .content { display: none; padding: 15px; border: 1px solid var(--border); border-top: none; background: #fff; border-radius: 0 0 8px 8px; font-size: 0.9rem; }

        .calc-box { background: #f0f7ff; border-left: 4px solid var(--secondary); padding: 15px; margin: 10px 0; font-size: 0.9rem; line-height: 1.6; }
        .net-pay-card { background: var(--primary); color: white; padding: 2rem; border-radius: 12px; text-align: center; margin-top: 2rem; }
        
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--secondary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px; }
        .warning-text { color: var(--error); font-weight: bold; display: none; margin-top: 10px; font-size: 0.85rem; }
        
        .status-tag { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        footer { text-align: center; padding: 2rem; color: #a0aec0; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">Allison C&B Portal | 2026</div>
    <div style="font-size: 0.85rem;">勞保上限 45,800 標準版</div>
</nav>

<div class="main-layout">
    <div class="content-area">
        <div id="loginSection" class="section active" style="text-align: center;">
            <h1 style="color: var(--primary);">員工個人薪酬資訊系統</h1>
            <p>請輸入員編以結算上月實領薪資 (測試: A001, A002, A003)</p>
            <input type="text" id="empId" style="max-width: 300px;" placeholder="員工編號">
            <button class="btn" style="max-width: 300px;" onclick="queryEmployee()">確認查詢</button>
        </div>

        <div id="results" class="section">
            <button onclick="location.reload()" style="background:none; border:none; color:var(--secondary); cursor:pointer;">← 重新查詢</button>
            <h2 id="empHeader"></h2>

            <h3>I. 基本薪資組成</h3>
            <div id="payBase"></div>

            <h3>II. 保險與勞退扣繳 (2026 標準)</h3>
            <div id="insCalcDetail"></div>
            <button class="collapsible" onclick="toggleCollapse(this, 'insTable')">展開完整勞健保級距對照表</button>
            <div class="content" id="insTable"></div>

            <h3>III. 上月已核准加班費明細</h3>
            <div id="approvedOTBox"></div>
            <button class="collapsible" onclick="toggleCollapse(this, 'otDetailContent')">展開加班費詳細階梯計算過程</button>
            <div class="content" id="otDetailContent"></div>

            <h3>IV. 假別天數查詢</h3>
            <div id="leaveDetailBox"></div>

            <div class="net-pay-card">
                <div style="opacity: 0.8; font-size: 0.9rem;">2026年02月 實領薪資 (Net Pay)</div>
                <div id="netPayValue" style="font-size: 2.8rem; font-weight: bold; margin: 10px 0;"></div>
                <div id="netPayList" style="text-align: left; font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h3 style="margin-top:0; color:var(--primary);">加班試算小工具</h3>
            <p style="font-size: 0.75rem; color:#666;">※ 此為模擬查詢，不計入正式薪資單</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div><label style="font-size:0.7rem">一</label><input type="number" class="t-ot" id="t_1" value="0"></div>
                <div><label style="font-size:0.7rem">二</label><input type="number" class="t-ot" id="t_2" value="0"></div>
                <div><label style="font-size:0.7rem">三</label><input type="number" class="t-ot" id="t_3" value="0"></div>
                <div><label style="font-size:0.7rem">四</label><input type="number" class="t-ot" id="t_4" value="0"></div>
                <div><label style="font-size:0.7rem">五</label><input type="number" class="t-ot" id="t_5" value="0"></div>
                <div><label style="font-size:0.7rem">六(休)</label><input type="number" class="t-ot" id="t_6" value="0"></div>
            </div>
            <div id="toolWarn" class="warning-text">⚠️ 每日加班不可超過4小時或為負數</div>
            <button class="btn" style="background:var(--accent);" onclick="runToolCalc()">立即試算</button>
            <div id="toolResult" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"></div>
        </div>
    </div>
</div>

<footer>Allison Wang © 2026 C&B Portfolio Project</footer>

<script>
    const employees = {
        "A001": { name: "王小明", base: 42000, meal: 3000, labVol: 0.06, deps: 0, annTotal: 7, annUsed: 3, m_late: 0, m_leave_sick: 0, m_leave_personal: 0, m_leave_ann: 2, otApproved: [2, 0, 1.5, 0, 4, 0] },
        "A002": { name: "李小華", base: 32000, meal: 3000, labVol: 0, deps: 2, annTotal: 3, annUsed: 0, m_late: 1, m_leave_sick: 1, m_leave_personal: 0, m_leave_ann: 0, otApproved: [0, 0, 0, 0, 0, 0] },
        "A003": { name: "張大衛", base: 63000, meal: 3000, labVol: 0.06, deps: 1, annTotal: 14, annUsed: 5, m_late: 0, m_leave_sick: 0, m_leave_personal: 0, m_leave_ann: 1, otApproved: [4, 2, 4, 1, 4, 0] }
    };

    const brackets = [29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800, 48200, 50600, 53000, 55400, 57800, 60800, 63800, 67000, 72800, 76500, 80200];
    const LAB_CAP = 45800;
    let currentEmp = null;

    function queryEmployee() {
        const id = document.getElementById('empId').value.toUpperCase();
        if(!employees[id]) { alert("無此員編"); return; }
        currentEmp = employees[id];
        
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('empHeader').innerText = `${currentEmp.name} (${id}) 2026/02 結算`;

        // I. 基本薪資
        document.getElementById('payBase').innerHTML = `<table><tr><th>本薪</th><td>$${currentEmp.base.toLocaleString()}</td><th>伙食津貼</th><td>$${currentEmp.meal.toLocaleString()}</td></tr></table>`;

        // II. 保險勞退
        renderInsuranceLogic(currentEmp.base + currentEmp.meal);

        // III. 加班費 (已核准)
        const otRes = calculateOTProcess(currentEmp.otApproved, currentEmp.base);
        currentEmp.otPay = otRes.total;
        document.getElementById('approvedOTBox').innerHTML = `<table><tr><th>本月核准總時數</th><td>${currentEmp.otApproved.reduce((a,b)=>a+b,0)}h</td><th>核准加班費總計</th><td style="color:var(--accent);font-weight:bold;">$${otRes.total.toLocaleString()}</td></tr></table>`;
        document.getElementById('otDetailContent').innerHTML = otRes.detailHtml;

        // IV. 假別
        renderLeaveTable();

        // V. 總結
        renderNetPay();
    }

    function renderInsuranceLogic(totalPay) {
        let h_bracket = brackets.find(b => b >= totalPay) || brackets[brackets.length-1];
        let l_bracket = totalPay > LAB_CAP ? LAB_CAP : (brackets.find(b => b >= totalPay && b <= LAB_CAP) || LAB_CAP);
        
        const lab = Math.round(l_bracket * 0.125 * 0.2);
        const hea = Math.round(h_bracket * 0.0517 * 0.3 * (1 + Math.min(currentEmp.deps, 3)));
        const ret = Math.round(h_bracket * currentEmp.labVol);

        currentEmp.deductions = { lab, hea, ret };

        document.getElementById('insCalcDetail').innerHTML = `
            <div class="calc-box">
                • 勞保級距：$${l_bracket.toLocaleString()} → 扣繳：$${lab} (12.5% × 20%)<br>
                • 健保級距：$${h_bracket.toLocaleString()} → 扣繳：$${hea} (5.17% × 30% × ${1+currentEmp.deps}口)<br>
                • 勞退自提：$${h_bracket.toLocaleString()} → 扣繳：$${ret} (${currentEmp.labVol*100}%)
            </div>`;

        let tableHtml = `<table><tr><th>級距</th><th>勞保(上限45800)</th><th>健保(單人)</th></tr>`;
        brackets.forEach(b => {
            const lb = b > LAB_CAP ? LAB_CAP : b;
            tableHtml += `<tr class="${b === h_bracket ? 'highlight-row':''}"><td>$${b.toLocaleString()}</td><td>$${Math.round(lb*0.125*0.2)}</td><td>$${Math.round(b*0.0517*0.3)}</td></tr>`;
        });
        document.getElementById('insTable').innerHTML = tableHtml + "</table>";
    }

    function calculateOTProcess(hoursArr, base) {
        const hourly = base / 240;
        let total = 0;
        let html = `<table><tr><th>日期</th><th>時數</th><th>計算拆解</th><th>小計</th></tr>`;
        hoursArr.forEach((h, i) => {
            if(h > 0) {
                let p = h <= 2 ? (h * hourly * 1.34) : (2 * hourly * 1.34 + (h-2) * hourly * 1.67);
                total += p;
                html += `<tr><td>週${['一','二','三','四','五','六'][i]}</td><td>${h}h</td><td>${h<=2 ? h+'h × 1.34' : '(2h × 1.34) + ('+(h-2).toFixed(1)+'h × 1.67)'}</td><td>$${Math.round(p)}</td></tr>`;
            }
        });
        return { total: Math.round(total), detailHtml: html + "</table>" };
    }

    function renderLeaveTable() {
        const hasDeduction = (currentEmp.m_late > 0 || currentEmp.m_leave_sick > 0 || currentEmp.m_leave_personal > 0);
        document.getElementById('leaveDetailBox').innerHTML = `
            <p><strong>【年度結算】</strong></p>
            <table><tr><th>特休總額</th><th>已使用</th><th>剩餘</th></tr><tr><td>${currentEmp.annTotal}</td><td>${currentEmp.annUsed}</td><td>${currentEmp.annTotal - currentEmp.annUsed}</td></tr></table>
            <p><strong>【當月狀況紀錄】</strong></p>
            <table><tr><th>遲到/早退</th><th>病假</th><th>事假</th><th>特休</th><th>當月全勤</th></tr>
            <tr><td>${currentEmp.m_late} 次</td><td>${currentEmp.m_leave_sick} 天</td><td>${currentEmp.m_leave_personal} 天</td><td>${currentEmp.m_leave_ann} 天</td>
            <td><span class="status-tag" style="background:${hasDeduction?'#fed7d7':'#c6f6d5'}; color:${hasDeduction?'#822727':'#22543d'};">${hasDeduction?'無 (有請假/遲到)':'有 (符合資格)'}</span></td></tr></table>`;
    }

    function renderNetPay() {
        const gross = currentEmp.base + currentEmp.meal + currentEmp.otPay;
        const deduct = currentEmp.deductions.lab + currentEmp.deductions.hea + currentEmp.deductions.ret;
        document.getElementById('netPayValue').innerText = `$${(gross - deduct).toLocaleString()}`;
        document.getElementById('netPayList').innerHTML = `
            ▶ 【加項】 本薪 $${currentEmp.base.toLocaleString()} + 伙食 $${currentEmp.meal.toLocaleString()} + 加班費 $${currentEmp.otPay.toLocaleString()} <br>
            ▶ 【扣項】 勞保 $${currentEmp.deductions.lab.toLocaleString()} + 健保 $${currentEmp.deductions.hea.toLocaleString()} + 勞退自提 $${currentEmp.deductions.ret.toLocaleString()}
        `;
    }

    function runToolCalc() {
        const warn = document.getElementById('toolWarn');
        warn.style.display = 'none';
        let err = false; let hrs = [];
        for(let i=1; i<=6; i++) {
            let v = parseFloat(document.getElementById('t_'+i).value) || 0;
            if(v < 0 || v > 4) err = true;
            hrs.push(v);
        }
        if(err) { warn.style.display = 'block'; return; }
        const res = calculateOTProcess(hrs, currentEmp ? currentEmp.base : 30000);
        document.getElementById('toolResult').innerHTML = `<strong>試算總金額：$${res.total.toLocaleString()}</strong><br><small>(以底薪 ${currentEmp?currentEmp.base:30000} 計算)</small>`;
    }

    function toggleCollapse(btn, id) {
        btn.classList.toggle("active-collapse");
        const c = document.getElementById(id);
        c.style.display = (c.style.display === "block") ? "none" : "block";
    }
</script>
</body>
</html>
