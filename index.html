<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 薪酬管理與員工自助系統 | Allison HR Tech</title>
    <style>
        :root {
            --primary: #1a3a5f;
            --secondary: #2c5282;
            --accent: #ed8936;
            --bg: #f7fafc;
            --white: #ffffff;
            --success: #48bb78;
            --border: #e2e8f0;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: #2d3748; }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        
        .section { display: none; background: var(--white); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .active { display: block; }
        
        /* 薪資條與表格樣式 */
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        th { background: #f8fafc; color: var(--primary); }
        .highlight-row { background: #fffaf0; border: 2px solid var(--accent) !important; font-weight: bold; }
        
        /* 摺疊收納樣式 */
        .collapsible { background: #edf2f7; color: #4a5568; cursor: pointer; padding: 12px; width: 100%; border: none; text-align: left; border-radius: 8px; font-weight: bold; margin-top: 10px; display: flex; justify-content: space-between; }
        .collapsible:after { content: '\002B'; }
        .active-collapse:after { content: "\2212"; }
        .content { display: none; overflow: hidden; background: white; border: 1px solid var(--border); border-top: none; padding: 15px; border-radius: 0 0 8px 8px; }

        /* 計算註解區 */
        .calc-box { background: #f0f9ff; border-left: 4px solid var(--secondary); padding: 15px; margin: 10px 0; font-size: 0.9rem; line-height: 1.8; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        
        /* 輸入控制 */
        .input-group { margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 1rem; }
        .btn { background: var(--secondary); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; margin-top: 10px; }
        .btn:hover { background: var(--primary); }
        
        footer { text-align: center; padding: 3rem; color: #a0aec0; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">Allison C&B Portal</div>
    <div id="dateDisplay">2026 / 03 / 17 標準版</div>
</nav>

<div class="container">
    <div id="homePage" class="active" style="text-align: center;">
        <h1 style="color: var(--primary); margin-top: 3rem;">薪酬與福利自助服務系統</h1>
        <p style="color: #718096;">提供員工最透明、即時的薪資查詢體驗</p>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 40px;">
            <button class="btn" onclick="showSection('employeePortal')" style="max-width: 250px;">員工查詢入口</button>
            <button class="btn" style="max-width: 250px; background: #cbd5e0; cursor: not-allowed;">HR 管理後台 (鎖定)</button>
        </div>
    </div>

    <div id="employeePortal" class="section">
        <button onclick="showSection('homePage')" style="background:none; border:none; color:var(--secondary); cursor:pointer; font-weight:bold;">← 返回首頁</button>
        <h2 style="border-bottom: 2px solid var(--border); padding-bottom: 10px;">個人薪酬資訊查詢</h2>
        
        <div class="input-group">
            <label style="display:block; margin-bottom:8px; font-weight:bold;">員工編號 (測試: A001, A002, A003)</label>
            <input type="text" id="empId" placeholder="請輸入您的員工編號">
            <button class="btn" onclick="queryEmployee()">確認身分並查詢</button>
        </div>

        <div id="results" style="display:none; margin-top: 40px;">
            <h3 style="color: var(--secondary);">I. 薪資組成細項</h3>
            <div id="payDetails"></div>

            <h3 style="color: var(--secondary); margin-top: 30px;">II. 社會保險扣繳</h3>
            <div id="personalInsInfo"></div>
            
            <button class="collapsible" onclick="toggleCollapse(this, 'fullTableContent')">查看 2026 年度完整投保級距表</button>
            <div class="content" id="fullTableContent">
                <div id="fullInsTable"></div>
            </div>

            <h3 style="color: var(--secondary); margin-top: 30px;">III. 加班費試算 (本週)</h3>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px;">
                <div><label>週一</label><input type="number" class="ot-input" id="ot_1" value="0"></div>
                <div><label>週二</label><input type="number" class="ot-input" id="ot_2" value="0"></div>
                <div><label>週三</label><input type="number" class="ot-input" id="ot_3" value="0"></div>
                <div><label>週四</label><input type="number" class="ot-input" id="ot_4" value="0"></div>
                <div><label>週五</label><input type="number" class="ot-input" id="ot_5" value="0"></div>
                <div><label>週六(休)</label><input type="number" class="ot-input" id="ot_6" value="0"></div>
            </div>
            <button class="btn" onclick="calculateAutoOT()" style="background: var(--accent);">開始智慧試算</button>
            
            <div id="otSimpleResult" style="margin-top:15px; font-size:1.1rem; font-weight:bold; color:var(--accent); text-align:right;"></div>
            
            <button class="collapsible" id="otCollapseBtn" onclick="toggleCollapse(this, 'otDetailContent')" style="display:none;">查看詳細加班費計算公式</button>
            <div class="content" id="otDetailContent">
                <div id="otDetailList"></div>
            </div>

            <h3 style="color: var(--secondary); margin-top: 30px;">IV. 假別天數查詢</h3>
            <div id="leaveDetails"></div>
        </div>
    </div>
</div>

<footer>Allison Wang © 2026 HR C&B Project Portal</footer>

<script>
    const employees = {
        "A001": { name: "王小明", base: 42000, meal: 3000, bonus: 2000, deps: 0, annUsed: 3, annTotal: 7, sickUsed: 1, fullAtt: true },
        "A002": { name: "李小華", base: 32000, meal: 3000, bonus: 0, deps: 2, annUsed: 0, annTotal: 3, sickUsed: 2, fullAtt: true },
        "A003": { name: "張大衛", base: 60000, meal: 3000, bonus: 5000, deps: 1, annUsed: 10, annTotal: 14, sickUsed: 0, fullAtt: false }
    };

    const brackets = [29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800, 48200, 50600];
    let currentEmp = null;

    function showSection(id) {
        document.querySelectorAll('.section, #homePage').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function queryEmployee() {
        const id = document.getElementById('empId').value.toUpperCase();
        if(!employees[id]) { alert("員編不存在，請重新輸入"); return; }
        currentEmp = employees[id];
        
        // I. 薪資細項
        document.getElementById('payDetails').innerHTML = `
            <table>
                <tr><th>項目</th><th>金額</th><th>備註</th></tr>
                <tr><td>基本薪資</td><td>$${currentEmp.base.toLocaleString()}</td><td>固定月薪</td></tr>
                <tr><td>伙食津貼</td><td>$${currentEmp.meal.toLocaleString()}</td><td>免稅額度內</td></tr>
                <tr><td>績效/職務加給</td><td>$${currentEmp.bonus.toLocaleString()}</td><td>變動獎金</td></tr>
                <tr style="background:#f0f7ff; font-weight:bold;"><td>應領總計</td><td>$${(currentEmp.base + currentEmp.meal + currentEmp.bonus).toLocaleString()}</td><td>-</td></tr>
            </table>`;

        // II. 勞健保
        renderInsurance(currentEmp.base + currentEmp.meal + currentEmp.bonus, currentEmp.deps);

        // IV. 假別
        document.getElementById('leaveDetails').innerHTML = `
            <table>
                <tr><th>假別</th><th>已使用</th><th>剩餘</th><th>影響全勤</th></tr>
                <tr><td>特別休假</td><td>${currentEmp.annUsed} 天</td><td>${currentEmp.annTotal - currentEmp.annUsed} 天</td><td>否</td></tr>
                <tr><td>病假 (半薪)</td><td>${currentEmp.sickUsed} 天</td><td>${30 - currentEmp.sickUsed} 天</td><td>是</td></tr>
                <tr style="background:${currentEmp.fullAtt ? '#f0fff4':'#fff5f5'}">
                    <th>全勤狀態</th><td colspan="3">${currentEmp.fullAtt ? '<span class="status-badge" style="background:#c6f6d5; color:#22543d;">符合資格</span>' : '<span class="status-badge" style="background:#fed7d7; color:#822727;">不符合 (因請假/遲到)</span>'}</td>
                </tr>
            </table>`;

        document.getElementById('results').style.display = 'block';
    }

    function renderInsurance(totalPay, deps) {
        let bracket = brackets.find(b => b >= totalPay) || brackets[brackets.length-1];
        
        const labAmount = Math.round(bracket * 0.125 * 0.2); 
        const heaAmount = Math.round(bracket * 0.0517 * 0.3 * (1 + Math.min(deps, 3)));

        document.getElementById('personalInsInfo').innerHTML = `
            <div class="calc-box">
                <strong>當前投保級距：$${bracket.toLocaleString()}</strong><br>
                • 勞工保險：$${bracket.toLocaleString()} (級距) × 12.5% (費率) × 20% (自付比例) = <strong>$${labAmount}</strong><br>
                • 健康保險：$${bracket.toLocaleString()} (級距) × 5.17% (費率) × 30% (自付比例) × ${1+deps} (含眷屬口數) = <strong>$${heaAmount}</strong>
                ${deps > 0 ? `<br><small>※ 眷屬加保：已包含 ${deps} 位眷屬</small>` : ''}
            </div>`;

        let tableHtml = `<table><tr><th>投保薪資分級</th><th>勞保自付</th><th>健保自付(單人)</th></tr>`;
        brackets.forEach(b => {
            tableHtml += `<tr class="${b === bracket ? 'highlight-row' : ''}">
                <td>$${b.toLocaleString()}</td><td>$${Math.round(b*0.125*0.2)}</td><td>$${Math.round(b*0.0517*0.3)}</td>
            </tr>`;
        });
        tableHtml += `</table>`;
        document.getElementById('fullInsTable').innerHTML = tableHtml;
    }

    function calculateAutoOT() {
        const hourly = (currentEmp.base / 240);
        let totalPay = 0;
        let detailHtml = "<ul>";
        
        for(let i=1; i<=6; i++) {
            let h = parseFloat(document.getElementById('ot_'+i).value) || 0;
            if(h > 0) {
                let dayName = ['','一','二','三','四','五','六'][i];
                let dayPay = 0;
                let desc = "";
                
                if(h <= 2) {
                    dayPay = h * hourly * 1.34;
                    desc = `${h}h × 1.34`;
                } else {
                    dayPay = (2 * hourly * 1.34) + ((h - 2) * hourly * 1.67);
                    desc = `(2h × 1.34) + (${(h-2).toFixed(1)}h × 1.67)`;
                }
                totalPay += dayPay;
                detailHtml += `<li>週${dayName}：時薪 $${hourly.toFixed(1)} × [${desc}] = $${Math.round(dayPay)}</li>`;
            }
        }
        detailHtml += "</ul>";
        
        document.getElementById('otSimpleResult').innerText = `預算本週加班費總計：$${Math.round(totalPay).toLocaleString()}`;
        document.getElementById('otDetailList').innerHTML = detailHtml;
        document.getElementById('otCollapseBtn').style.display = "flex";
    }

    function toggleCollapse(btn, contentId) {
        btn.classList.toggle("active-collapse");
        const content = document.getElementById(contentId);
        content.style.display = (content.style.display === "block") ? "none" : "block";
    }
</script>
</body>
</html>
