<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR C&B 專業薪酬工具箱</title>
    <style>
        :root {
            --primary-color: #1a3a5f;
            --secondary-color: #f4f7f9;
            --accent-color: #e67e22;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--secondary-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary-color); text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        h2 { color: var(--accent-color); font-size: 1.2em; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { opacity: 0.9; }
        .result { margin-top: 15px; padding: 15px; background: #eef9ff; border-left: 5px solid var(--primary-color); display: none; }
        .footer { text-align: center; font-size: 0.8em; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>HR C&B 薪酬試算工具箱</h1>
    <p style="text-align: center; color: #666;">提供給公司同仁的快速薪資福利查詢平台</p>

    <div class="section">
        <h2>1. 加班費自動試算 (勞基法標準)</h2>
        <label>月薪 (本薪+固定津貼)</label>
        <input type="number" id="monthlySalary" placeholder="例如: 36000">
        
        <label>平日加班時數 (前2小時)</label>
        <input type="number" id="ot1" placeholder="小時">
        
        <label>平日加班時數 (第3小時起)</label>
        <input type="number" id="ot2" placeholder="小時">
        
        <button onclick="calculateOT()">開始計算加班費</button>
        
        <div id="otResult" class="result">
            <strong>計算結果：</strong><br>
            平日時薪：$<span id="hourlyRate">0</span><br>
            預估總加班費：<span id="totalOT" style="color:red; font-size: 1.2em; font-weight: bold;">$0</span>
        </div>
    </div>

    <div class="section">
        <h2>2. 勞健保自付額快速查詢</h2>
        <p style="font-size: 0.9em; color: #666;">*依據 2024/2025 最新級距參考</p>
        <label>請輸入投保薪資分級</label>
        <input type="number" id="insSalary" placeholder="例如: 36300">
        <button onclick="calculateIns()">查詢自付額</button>
        
        <div id="insResult" class="result">
            <strong>預估個人負擔：</strong><br>
            勞保費 (普通+就保)：$<span id="labourIns">0</span><br>
            健保費：$<span id="healthIns">0</span><br>
            <small>*實際金額仍以公司薪資單為準</small>
        </div>
    </div>

    <div class="footer">
        本工具由 Allison Wang 開發製作 | 應徵 C&B 專員作品展示
    </div>
</div>

<script>
    function calculateOT() {
        const salary = parseFloat(document.getElementById('monthlySalary').value);
        const ot1 = parseFloat(document.getElementById('ot1').value) || 0;
        const ot2 = parseFloat(document.getElementById('ot2').value) || 0;

        if(!salary) { alert("請輸入月薪"); return; }

        // 勞基法：平日時薪 = 月薪 / 240
        const hourly = (salary / 240).toFixed(2);
        // 前2小時 1.34倍，第3小時起 1.67倍
        const otPay = (ot1 * hourly * 1.34) + (ot2 * hourly * 1.67);

        document.getElementById('hourlyRate').innerText = hourly;
        document.getElementById('totalOT').innerText = '$' + Math.round(otPay);
        document.getElementById('otResult').style.display = 'block';
    }

    function calculateIns() {
        const insSalary = parseFloat(document.getElementById('insSalary').value);
        if(!insSalary) { alert("請輸入投保薪資"); return; }

        // 簡易邏輯：勞保 2.4% (個人), 健保 1.55% (個人) -> 僅為教學示意，實際需對應級距表
        const lab = Math.round(insSalary * 0.12 * 0.2); // 勞保費率12%, 個人負擔20%
        const hea = Math.round(insSalary * 0.0517 * 0.3); // 健保費率5.17%, 個人負擔30%

        document.getElementById('labourIns').innerText = lab;
        document.getElementById('healthIns').innerText = hea;
        document.getElementById('insResult').style.display = 'block';
    }
</script>

</body>
</html>
